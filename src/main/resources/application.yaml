spring:
  application:
    name: menify
  datasource:
    url: jdbc:postgresql://db:5432/postgres
    username: postgres
    password: postgres
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  debug: true

  logging:
    level:
      org.springframework.boot.autoconfigure.flyway: DEBUG
      org.flywaydb: DEBUG
      org.springframework.boot.autoconfigure.jdbc: DEBUG